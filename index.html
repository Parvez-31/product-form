<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product From</title>

    <!-- CSS Start -->
    <style>
      body {
        font-family: Arial;
        padding: 20px;
        background: #f5f5f5;
      }

      form {
        max-width: 400px;
        margin: auto;
        background: #fff;
        padding: 20px;
        border-radius: 8px;
      }

      label {
        display: block;
        margin-top: 10px;
      }

      input,
      textarea,
      select,
      button {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
      }

      .error {
        color: red;
        font-size: 13px;
        margin: 3px 0;
      }

      button {
        margin-top: 15px;
        background: black;
        color: white;
        border: none;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <form id="productForm">
      <h2>Add Product</h2>

      <!-- Product Name -->
      <label>Product Name</label>
      <input type="text" name="name" />
      <p class="error" id="nameError"></p>

      <!-- Description -->
      <label>Product Description</label>
      <textarea name="description"></textarea>
      <p class="error" id="descError"></p>

      <!-- Category -->
      <label>Category</label>
      <select name="category">
        <option value="">Select Category</option>
        <option value="electronics">Electronics</option>
        <option value="clothing">Clothing</option>
        <option value="food">Food</option>
      </select>
      <p class="error" id="catError"></p>

      <!-- Price -->
      <label>Price</label>
      <input type="number" name="price" />
      <p class="error" id="priceError"></p>

      <!-- Checkbox -->
      <label>
        <input type="checkbox" name="isPublish" />
        Publish Product
      </label>

      <!-- Submit -->
      <button type="submit">Submit</button>
    </form>

    <!-- JS Link -->
    <script src="src/script.js"></script>
  </body>
</html>
